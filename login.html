<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huella Solidaria — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="card">

    <div class="logo-row">
      <div class="logo-grid">
        <span style="background:#1D9E75; border-radius:3px 3px 3px 0;"></span>
        <span style="background:#EF9F27; border-radius:3px 3px 0 3px;"></span>
        <span style="background:#D85A30; border-radius:3px 0 3px 3px;"></span>
        <span style="background:#7F77DD; border-radius:0 3px 3px 3px;"></span>
      </div>
      <span class="logo-name">Servicio Social</span>
    </div>

    <h1>Huella Solidaria</h1>
    <p class="subtitle">Inicia sesión con tu correo institucional para continuar.</p>

    <div class="role-badge" id="roleBadge"></div>
    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" novalidate>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@tec.mx" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div class="forgot">
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit">Iniciar sesión</button>
      <a href="dashboard.html">Iniciar sesión</a> <!-- Boton de prueba para no poner los usuarios de prueba -->

    </form>

    <hr />

    <footer>
      Acceso disponible solo para correos institucionales.<br>
      <a href="#">¿Necesitas ayuda?</a>
    </footer>

  </div>

  <script src="js/login.js"></script>
</body>
</html>
