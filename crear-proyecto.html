<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huella Solidaria - Crear Proyecto</title>
  <link rel="stylesheet" href="css/proyectos.css">
  <style>
    .form-container { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 700px; margin-top: 20px; border: 1px solid #f1f5f9; }
    .form-row { display: flex; gap: 20px; }
    .form-group { margin-bottom: 20px; flex: 1; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #413434; margin-bottom: 8px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    .btn-submit { background: #1D9E75; color: #fff; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: inherit; transition: background 0.2s; }
    .btn-submit:hover { background: #158360; }
    .btn-cancel { background: #f1f5f9; color: #64748b; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: inherit; transition: background 0.2s; }
    .btn-cancel:hover { background: #e2e8f0; color: #0f172a; }
  </style>
</head>
<body>

<div class="dash">
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <div class="sb-logo-grid">
          <span style="background:#1D9E75;border-radius:2px 2px 2px 0;"></span>
          <span style="background:#fff;border-radius:2px 2px 0 2px;opacity:0.9;"></span>
          <span style="background:#D85A30;border-radius:2px 0 2px 2px;"></span>
          <span style="background:#7F77DD;border-radius:0 2px 2px 2px;"></span>
        </div>
      </div>
      <div class="sb-name">Impacto<br>Solidario</div>
    </div>
    <div class="sb-divider"></div>
    <nav class="sb-nav">
      <a href="dashboard.html" class="sb-item">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7A1 1 0 003 11h1v6a1 1 0 001 1h4v-4h2v4h4a1 1 0 001-1v-6h1a1 1 0 00.707-1.707l-7-7z"/></svg>
        Inicio
      </a>
      <a href="proyectos.html" class="sb-item active">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
        Proyectos
      </a>
      <a href="analisis.html" class="sb-item">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
        Análisis
      </a>
      <a href="lideres.html" class="sb-item">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a4 4 0 00-.82-2.47A6 6 0 0118 18h-2zM4.82 14.53A4 4 0 004 17v1H2a6 6 0 012.82-5.47z"/></svg>
        Nuestros Líderes
      </a>
      <a href="calendario.html" class="sb-item">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z"/></svg>
        Calendario
      </a>
    </nav>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">MG</div>
        <div>
          <div class="sb-uname">María González</div>
          <div class="sb-urole">Administrador</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    
    <div class="topbar">
      <div class="topbar-left">
        <h2>Crear Nuevo Proyecto</h2>
        <p>Completa el formulario para registrar una nueva iniciativa</p>
      </div>
    </div>

    <div class="content">
      <div class="form-container">
        <form onsubmit="event.preventDefault(); window.location.href='proyectos.html'; alert('Proyecto creado exitosamente');">
          <div class="form-group">
            <label class="form-label">Nombre del Proyecto</label>
            <input type="text" class="form-input" placeholder="Ej. Reforestación Urbana" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Categoría</label>
              <select class="form-select" required>
                <option value="">Selecciona una categoría</option>
                <option value="Educacion">Educación</option>
                <option value="Salud">Salud</option>
                <option value="Medio Ambiente">Medio Ambiente</option>
                <option value="Comunidad">Organización Comunitaria</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Estado / Ubicación</label>
              <select class="form-select" required>
                <option value="">Selecciona un estado</option>
                <option value="Puebla">Puebla</option>
                <option value="Yucatan">Yucatán</option>
                <option value="Oaxaca">Oaxaca</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Líder Asignado</label>
              <select class="form-select">
                <option value="">Sin asignar (Opcional)</option>
                <option value="Juan">Juan Pérez</option>
                <option value="Maria">María García</option>
                <option value="Carlos">Carlos Sánchez</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Meta de Beneficiarios</label>
              <input type="number" class="form-input" placeholder="Ej. 500" min="1">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Descripción de la Iniciativa</label>
            <textarea class="form-textarea" placeholder="Describe brevemente los objetivos y actividades principales del proyecto..." required></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="window.location.href='proyectos.html'">Cancelar</button>
            <button type="submit" class="btn-submit">Guardar Proyecto</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
